    upstream comthino_frontend {
        server comthino-frontend:80;
        keepalive 16;
    }

    # --- COMTHINO: comthino.com ---
    server {
        listen 80;
        server_name comthino.com www.comthino.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://comthino.com$request_uri;
        }
    }

    server {
        listen 443 ssl http2;
        server_name comthino.com;

        ssl_certificate /etc/nginx/ssl/live/comthino.com/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/live/comthino.com/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        client_max_body_size 100M;

        location / {
            proxy_pass http://comthino_frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }
    }
